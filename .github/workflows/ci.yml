name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -e .
      - name: Lint
        run: ruff check src tests scripts
      - name: Test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p reports
          set +e
          pytest -q > reports/ci-pytest.txt 2>&1
          status=$?
          cat reports/ci-pytest.txt
          exit $status
      - name: Build database
        if: steps.test.outcome == 'success'
        run: python -m real_estate_db.build_excel
      - name: Upload generated database and diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: real-estate-broker-database-ci
          path: |
            database/
            reports/ci-pytest.txt
          if-no-files-found: error
          retention-days: 30
      - name: Commit test diagnostics
        if: steps.test.outcome == 'failure' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ci-pytest.txt
          if ! git diff --cached --quiet; then
            git commit -m "diagnostics: capture CI pytest failure [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
      - name: Fail when tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
