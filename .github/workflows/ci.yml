name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -e .
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest -q
      - name: Build database
        run: python -m real_estate_db.build_excel
      - name: Upload generated database
        uses: actions/upload-artifact@v7
        with:
          name: real-estate-broker-database
          path: database/
          if-no-files-found: error
          retention-days: 30
