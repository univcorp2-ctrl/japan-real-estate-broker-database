name: Publish database manually

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt -e .
      - name: Validate and generate Excel
        run: |
          pytest -q
          python -m real_estate_db.build_excel
      - name: Upload database artifact
        uses: actions/upload-artifact@v7
        with:
          name: real-estate-broker-database-manual
          path: database/
          if-no-files-found: error
          retention-days: 90

